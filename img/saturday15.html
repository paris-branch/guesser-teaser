  .container svg {
    display: block;
    width: 100%;
    height: auto;
    cursor: pointer;
  }
  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .mistake-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(144, 238, 144, 0.35);
    pointer-events: none;
    transform: translate(-50%, -50%);
    width: 28px;
    height: 28px;
    animation: fade-in 0.2s ease-out;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .counter {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    pointer-events: none;
  }

<script>
const mistakes = [
  { x: 251, y: 5, w: 18, h: 11, label: '"1 2" in right margin' },
  { x: 251, y: 22, w: 18, h: 13, label: '"P" in right margin' },
  { x:  2, y: 5, w: 20, h: 11, label: '"2 3 1" in left margin' },
  { x:  2, y: 14, w: 20, h: 19, label: '"6" in left margin' },
  { x: 44, y: 17, w: 22, h: 20, label: 'arrows+R swapped right' },
  { x: 28, y: 17, w: 18, h: 20, label: '"1" + curve swapped left' },
  { x: 66, y: 0, w: 22, h: 11, label: '"Tournée" instead of Tourbillon' },
];

const svg = document.querySelector('svg');
const overlay = document.getElementById('overlay');
const counter = document.getElementById('counter');
let found = new Set();
const vb = { minX: -1, minY: -1, w: 272, h: 73.73 };

svg.addEventListener('click', function (e) {
  const svgRect = svg.getBoundingClientRect();
  const scaleX = svgRect.width / vb.w;
  const scaleY = svgRect.height / vb.h;
  const vbX = (e.clientX - svgRect.left) / scaleX + vb.minX;
  const vbY = (e.clientY - svgRect.top) / scaleY + vb.minY;
  const gY = vbY - 18;

  for (let i = 0; i < mistakes.length; i++) {
    const m = mistakes[i];
    if (vbX >= m.x && vbX <= m.x + m.w && gY >= m.y && gY <= m.y + m.h) {
      if (!found.has(i)) {
        found.add(i);
        const circle = document.createElement('div');
        circle.className = 'mistake-dot';
        const px = (vbX - vb.minX) * scaleX;
        const py = (vbY - vb.minY) * scaleY;
        circle.style.left = px + 'px';
        circle.style.top = py + 'px';
        overlay.appendChild(circle);
        counter.textContent = found.size + ' / ' + mistakes.length + ' mistakes found';
      }
      break;
    }
  }
});
</script>
